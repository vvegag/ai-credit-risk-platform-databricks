# Databricks Asset Bundle - AI Credit Risk Platform
#
# Uso:
#   databricks bundle deploy -t dev   # faz upload dos notebooks e cria o job
#   databricks bundle run credit_risk_pipeline -t dev   # roda o pipeline completo ponta a ponta
#
# Pré-requisitos: Databricks CLI configurado (`databricks configure`) e um workspace com
# Unity Catalog habilitado. O parâmetro `catalog` é passado a cada notebook via widget
# (default: "credit_risk") — troque em `variables.catalog.default` para usar outro nome.

bundle:
  name: ai-credit-risk-platform

variables:
  catalog:
    description: Nome do catálogo Unity Catalog usado pelo pipeline
    default: credit_risk

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    credit_risk_pipeline:
      name: "[${bundle.target}] AI Credit Risk Platform - Pipeline Completo"
      tasks:
        - task_key: setup_catalog
          notebook_task:
            notebook_path: ./01_setup/01_criar_catalogo_schemas.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: setup_permissoes
          depends_on:
            - task_key: setup_catalog
          notebook_task:
            notebook_path: ./01_setup/02_configurar_permissoes.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: ingestao_bronze
          depends_on:
            - task_key: setup_permissoes
          notebook_task:
            notebook_path: ./02_ingestion/01_popular_dados_completos.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: transformacao_silver
          depends_on:
            - task_key: ingestao_bronze
          notebook_task:
            notebook_path: ./03_feature_engineering/01_transformacao_silver.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: transformacao_gold
          depends_on:
            - task_key: transformacao_silver
          notebook_task:
            notebook_path: ./03_feature_engineering/02_transformacao_gold.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: feature_store_rfm
          depends_on:
            - task_key: transformacao_gold
          notebook_task:
            notebook_path: ./03_feature_engineering/03_feature_store_rfm.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: clustering_features_ml
          depends_on:
            - task_key: feature_store_rfm
          notebook_task:
            notebook_path: ./03_feature_engineering/04_clustering_features_ml.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # Os 3 modelos são independentes entre si (todos leem gold.features_ml) e rodam em
        # paralelo — cada um só depende de clustering_features_ml, não um do outro.
        - task_key: modelo_classificacao
          depends_on:
            - task_key: clustering_features_ml
          notebook_task:
            notebook_path: ./04_modeling/01_modelo_classificacao_risco.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: modelo_regressao
          depends_on:
            - task_key: clustering_features_ml
          notebook_task:
            notebook_path: ./04_modeling/02_modelo_regressao.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: modelo_forecast_cashflow
          depends_on:
            - task_key: clustering_features_ml
          notebook_task:
            notebook_path: ./04_modeling/03_modelo_forecast_cashflow.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # AutoML + LightGBM: comparação exploratória contra o XGBoost manual, não substitui
        # o classificador oficial — roda em paralelo com os outros modelos.
        - task_key: automl_lightgbm_comparacao
          depends_on:
            - task_key: clustering_features_ml
          notebook_task:
            notebook_path: ./04_modeling/04_automl_lightgbm_comparacao.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # Combina a saída do classificador com a do regressor num ranking único de
        # priorização de cobrança — depende dos dois.
        - task_key: priorizacao_cobranca
          depends_on:
            - task_key: modelo_classificacao
            - task_key: modelo_regressao
          notebook_task:
            notebook_path: ./04_modeling/05_priorizacao_cobranca.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # MLOps é específico do classificador (retreino, drift, promoção Champion/Challenger) —
        # depende só de modelo_classificacao, não dos outros modelos.
        - task_key: mlops_pipeline
          depends_on:
            - task_key: modelo_classificacao
          notebook_task:
            notebook_path: ./05_mlops/01_mlops_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # Sincroniza o endpoint de Model Serving com o Champion mais recente promovido pelo
        # mlops_pipeline. Idempotente (cria ou atualiza) — seguro rodar toda semana.
        - task_key: model_serving_endpoint
          depends_on:
            - task_key: mlops_pipeline
          notebook_task:
            notebook_path: ./05_mlops/02_model_serving_endpoint.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: monitoring_drift
          depends_on:
            - task_key: mlops_pipeline
          notebook_task:
            notebook_path: ./07_monitoring/01_drift_detection.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # Validação A/B (simulação sintética — ver aviso no próprio notebook) do efeito da
        # intervenção de cobrança sobre a população priorizada. Depende de priorizacao_cobranca,
        # não de monitoring_drift.
        - task_key: validacao_ab_cobranca
          depends_on:
            - task_key: priorizacao_cobranca
          notebook_task:
            notebook_path: ./07_monitoring/02_validacao_ab_intervencao_cobranca.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # RAG protótipo (FAISS local) — só precisa da camada Silver, roda em paralelo com a
        # modelagem.
        - task_key: rag_validacao_prototipo
          depends_on:
            - task_key: transformacao_silver
          notebook_task:
            notebook_path: ./06_rag_validation/01_rag_notas_fiscais.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # RAG real (Databricks Vector Search): gera PDFs -> extrai/chunka/embeda -> indexa.
        # Depende de clustering_features_ml porque o gerador de documentos também lê
        # gold.features_ml, além das tabelas Bronze.
        - task_key: rag_gerar_documentos
          depends_on:
            - task_key: clustering_features_ml
          notebook_task:
            notebook_path: ./10_rag_agent/notebooks/01_gerar_documentos_credito.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: rag_vector_search
          depends_on:
            - task_key: rag_gerar_documentos
          notebook_task:
            notebook_path: ./10_rag_agent/notebooks/02_vector_search_rag.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        - task_key: rag_agent_langchain
          depends_on:
            - task_key: rag_vector_search
          notebook_task:
            notebook_path: ./10_rag_agent/notebooks/03_rag_agent_langchain.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

        # Manutenção Delta (OPTIMIZE/ZORDER/VACUUM) — depende do fim de todas as ramificações
        # que escrevem dados (modelagem/MLOps/monitoring e os dois caminhos de RAG), pra
        # garantir que a compactação rode depois que a semana inteira de escritas terminou.
        - task_key: manutencao_delta
          depends_on:
            - task_key: monitoring_drift
            - task_key: validacao_ab_cobranca
            - task_key: model_serving_endpoint
            - task_key: rag_validacao_prototipo
            - task_key: rag_agent_langchain
          notebook_task:
            notebook_path: ./01_setup/03_manutencao_delta.py
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600

      # Alerta por e-mail se qualquer task falhar na execução agendada — antes disso, uma
      # falha transitória na segunda-feira de manhã passava despercebida (job só reportava
      # sucesso/fracasso na UI, sem notificar ninguém).
      email_notifications:
        on_failure:
          - valdomirovega@gmail.com

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"   # segundas-feiras, 6h — retreino/scoring semanal
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED   # ative manualmente após validar a primeira execução
